name = "day1design-api"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# R2 bucket (이미지 업로드용) — 핸드오프 기준 day1design-r2 (APAC)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "day1design-r2"

[vars]
# CORS 화이트리스트 (콤마 구분)
ALLOWED_ORIGINS = "https://day1design.vercel.app,https://day1design.co.kr,https://www.day1design.co.kr,https://admin.day1design.co.kr,https://admin.day1design.vercel.app,http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5500"
R2_PUBLIC_BASE = "https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"

# 비밀값은 배포 전 wrangler secret put 으로 주입:
#   wrangler secret put AIRTABLE_TOKEN
#   wrangler secret put AIRTABLE_BASE_ID
#   wrangler secret put ADMIN_TOKEN
#   wrangler secret put TELEGRAM_BOT_TOKEN    (선택)
#   wrangler secret put TELEGRAM_CHAT_ID      (선택)
# 로컬 개발은 worker/.dev.vars 파일에 동일 키로 저장
