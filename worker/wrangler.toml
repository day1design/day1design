name = "day1design-api"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "../site"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
not_found_handling = "none"

# R2 bucket (이미지 업로드용) — 핸드오프 기준 day1design-r2 (APAC)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "day1design-r2"

# D1 database (데이터 저장 — Airtable 대체)
[[d1_databases]]
binding = "DB"
database_name = "day1design"
database_id = "60c293bc-5359-4a94-bc18-c3cda0829366"

[vars]
# CORS 화이트리스트 (콤마 구분)
ALLOWED_ORIGINS = "https://day1design.co.kr,https://www.day1design.co.kr,https://admin.day1design.co.kr,http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5500"
# 라우트 역할별 접근 출처. 직접 브라우저 접근처럼 Origin 없는 API 호출은 Worker에서 거부.
MAIN_ORIGINS = "https://day1design.co.kr,https://www.day1design.co.kr"
ADMIN_ORIGINS = "https://admin.day1design.co.kr"
R2_PUBLIC_BASE = "https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
ADMIN_USERNAME = "admin"
GA4_PROPERTY_ID = "537274300"
GSC_SITE_URL = "sc-domain:day1design.co.kr"
# Meta Pixel/CAPI 데이터세트 ID (day1design-web-260602). CAPI 토큰은 secret 으로 주입.
META_PIXEL_ID = "977283848476177"
# 견적 접수 테스트 화이트리스트 (운영팀 반복 테스트용). 효과: rate-limit + 봇트랩
# timing(3초) 우회만. 허니팟/검증/저장/알림은 일반 고객과 100% 동일. 콤마구분, 빈값이면 미적용.
ESTIMATE_RATE_LIMIT_ALLOWLIST = ""
ESTIMATE_ALLOWLIST_NAMES = ""
ESTIMATE_ALLOWLIST_PHONES = ""

[[routes]]
pattern = "day1design.co.kr/*"
zone_name = "day1design.co.kr"

[[routes]]
pattern = "www.day1design.co.kr/*"
zone_name = "day1design.co.kr"

[[routes]]
pattern = "admin.day1design.co.kr/*"
zone_name = "day1design.co.kr"

[[routes]]
pattern = "api.day1design.co.kr/*"
zone_name = "day1design.co.kr"

# 비밀값은 배포 전 wrangler secret put 으로 주입:
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put JWT_SECRET
#   wrangler secret put META_LEAD_SECRET
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put GA4_REFRESH_TOKEN
#   wrangler secret put GSC_REFRESH_TOKEN
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put GMAIL_CLIENT_ID
#   wrangler secret put GMAIL_CLIENT_SECRET
#   wrangler secret put GMAIL_REFRESH_TOKEN
#   wrangler secret put GMAIL_USER
#   wrangler secret put GMAIL_NOTIFY_TO
#   wrangler secret put NCP_SENS_ACCESS_KEY
#   wrangler secret put NCP_SENS_SECRET_KEY
#   wrangler secret put NCP_SENS_SERVICE_ID
#   wrangler secret put NCP_SENS_FROM_NUMBER   # 검수 통과 후 등록 발신번호 입력
#   printf "%s" "EAAdlUr..." | wrangler secret put META_AD_ACCESS_TOKEN
#   printf "%s" "986916453663066" | wrangler secret put META_AD_ACCOUNT_ID
#   printf "%s" "8717156602:AAFD..." | wrangler secret put META_RATE_TELEGRAM_BOT_TOKEN
#   printf "%s" "-1003958023969" | wrangler secret put META_RATE_TELEGRAM_CHAT_ID
#   printf "%s" "EAAxxx..." | wrangler secret put META_CAPI_TOKEN   # Events Manager→데이터세트→설정→전환 API→액세스 토큰
# 로컬 개발은 worker/.dev.vars 파일에 동일 키로 저장

# Cron Triggers
# - "0 19 * * *"  매일 KST 04:00: meta-ads sync + analytics snapshot + 풀 헬스점검(다이제스트)
# - "0 * * * *"   매시간 정각: 헬스 하트비트 점검(기록만, 오류 시 텔레그램). 전원 인디케이터용.
[triggers]
crons = ["0 19 * * *", "0 * * * *"]
