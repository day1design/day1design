<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Film CTA — 데이원디자인 (Preview)</title>
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      body {
        background: #fff;
      }
      .wf-topbar {
        background: #2b2620;
        color: #d9d4c7;
        font-family: var(--font-en), var(--font-kr);
        font-size: 12px;
        letter-spacing: 3px;
        text-align: center;
        padding: 12px 20px;
      }
      .wf-topbar strong {
        color: #fff;
        letter-spacing: 4px;
        margin-right: 12px;
      }
      .wf-context {
        background: #f4f0e8;
        padding: 32px 20px;
        text-align: center;
        border-bottom: 1px dashed #d9d4c7;
      }
      .wf-context p {
        font-family: var(--font-en), var(--font-kr);
        font-size: 11px;
        letter-spacing: 3px;
        color: #999;
      }
      .wf-context strong {
        color: #5a5448;
      }
      .wf-rulers {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 40px;
        display: flex;
        justify-content: space-between;
        font-family: var(--font-en), var(--font-kr);
        font-size: 10px;
        letter-spacing: 2px;
        color: #bbb;
        padding-top: 12px;
      }
      .wf-footer-hint {
        background: #1f1c18;
        color: #807769;
        text-align: center;
        padding: 40px 20px;
        font-family: var(--font-en), var(--font-kr);
        font-size: 11px;
        letter-spacing: 3px;
      }
    </style>
  </head>
  <body>
    <!-- 프리뷰 표시줄 -->
    <div class="wf-topbar">
      <strong>PREVIEW</strong>BRAND FILM + CTA · 메인페이지 포트폴리오 하단 삽입
    </div>

    <!-- 상단 컨텍스트: 포트폴리오 끝부분 시뮬레이션 -->
    <div class="wf-context">
      <p>↑ <strong>DAYONE PROJECT (포트폴리오 그리드)</strong> 영역 종료</p>
    </div>

    <!-- ========== BRAND FILM + CTA ========== -->
    <section class="brandfilm-section section">
      <div class="container brandfilm-inner">
        <div class="brandfilm-media">
          <div class="brandfilm-video">
            <iframe
              src="https://www.youtube.com/embed/B9Ox85lZ3KA"
              title="DAYONE BRAND FILM"
              loading="lazy"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
          </div>
          <p class="brandfilm-caption">DAYONE BRAND FILM</p>
        </div>
        <div class="brandfilm-copy">
          <p class="brandfilm-lead">
            데이원디자인은 믿고 맡길 수 있는<br />정제된 퀄리티를 제공합니다.
          </p>
          <p class="brandfilm-desc">
            견적, 공정, 마감 등 인테리어의 모든 과정을<br />신뢰할 수 있도록
            일합니다.
          </p>
          <a href="pages/estimates.html" class="btn-primary brandfilm-cta"
            >견적상담 신청</a
          >
        </div>
      </div>
    </section>

    <!-- 하단 컨텍스트: 푸터 영역 시뮬레이션 -->
    <div class="wf-footer-hint">↓ FOOTER 영역 시작</div>
  </body>
</html>
