<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담신청 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.co.kr" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.co.kr/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.co.kr/css/reset.css" />
    <link rel="stylesheet" href="admin.css?v=20260521-source-legend" />
    <script>
      window.ADMIN_PAGE = { title: "상담신청", nav: "estimates" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <section
          class="est-quick-stats"
          id="estQuickStats"
          aria-label="상담 접수량 간단 통계"
        >
          <article class="est-stat-card">
            <span class="est-stat-label">일간</span>
            <strong id="statDaily">—</strong>
            <em>오늘 접수</em>
          </article>
          <article class="est-stat-card">
            <span class="est-stat-label">주간</span>
            <strong id="statWeekly">—</strong>
            <em>최근 7일</em>
          </article>
          <article class="est-stat-card">
            <span class="est-stat-label">월간</span>
            <strong id="statMonthly">—</strong>
            <em>이번 달</em>
          </article>
        </section>

        <div class="admin-toolbar" style="margin-bottom: 12px">
          <div class="filter-row">
            <label>상태</label>
            <select id="filterStatus">
              <option value="">전체</option>
              <option value="고객 부재중">고객 부재중</option>
              <option value="진행불가 (예산/범위/지역/일정등)">
                진행불가 (예산/범위/지역/일정등)
              </option>
              <option value="전화상담 후 미진행">전화상담 후 미진행</option>
              <option value="전화상담 후 미팅예약">전화상담 후 미팅예약</option>
              <option value="전화상담 후 대기중">전화상담 후 대기중</option>
              <option value="보류">보류</option>
            </select>
            <label>기간</label>
            <input type="date" id="filterFrom" />
            <span class="filter-tilde">~</span>
            <input type="date" id="filterTo" />
            <button
              type="button"
              class="btn btn-ghost btn-sm"
              id="btnExportCsv"
            >
              엑셀 다운로드
            </button>
            <input
              type="search"
              id="filterSearch"
              class="filter-search"
              placeholder="이름/연락처/주소/캠페인 검색"
            />
          </div>
        </div>

        <!-- 유입 출처 탭 — 별도 줄로 분리 + 의미 안내 -->
        <div class="source-tab-bar">
          <div class="source-tab-bar-label">유입</div>
          <div
            class="source-tabs source-tabs-large"
            id="sourceTabs"
            role="tablist"
            aria-label="유입 출처"
          >
            <button
              type="button"
              class="source-tab active"
              data-source-tab=""
              aria-pressed="true"
            >
              전체
            </button>
            <button
              type="button"
              class="source-tab"
              data-source-tab="meta"
              aria-pressed="false"
            >
              Meta
            </button>
            <button
              type="button"
              class="source-tab"
              data-source-tab="homepage"
              aria-pressed="false"
            >
              홈페이지
            </button>
          </div>
          <div class="source-legend">
            <span class="legend-item">
              <span class="src-badge src-input">입력</span>
              <span class="legend-text"
                >고객이 폼에서 직접 선택/입력한 출처</span
              >
            </span>
            <span class="legend-item">
              <span class="src-badge src-actual src-first">첫</span>
              <span class="legend-text"
                >첫 진입 출처 (자체 트래커 SessionId 의 최초 page_view)</span
              >
            </span>
            <span class="legend-item">
              <span class="src-badge src-actual src-last">끝</span>
              <span class="legend-text"
                >마지막 진입 출처 (폼 제출 직전 utm/쿠키)</span
              >
            </span>
          </div>
        </div>

        <div class="est-layout">
          <div class="est-list" id="estBody">
            <div class="empty-state">불러오는 중...</div>
          </div>
        </div>
      </main>
    </div>
    <div class="modal est-modal" id="estDetailModal" hidden>
      <div class="modal-backdrop" data-est-close></div>
      <div
        class="modal-panel est-modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="estModalTitle"
      >
        <div class="modal-head est-modal-head">
          <h2 id="estModalTitle">접수 상세</h2>
          <div class="modal-head-actions">
            <button class="btn btn-ghost" id="btnSendSms" type="button">
              문자 발송
            </button>
            <button
              class="btn btn-ghost"
              id="btnOpenCustomerEdit"
              type="button"
            >
              고객정보 수정
            </button>
            <button
              class="icon-btn"
              data-est-close
              type="button"
              aria-label="상세 닫기"
            >
              ✕
            </button>
          </div>
        </div>
        <div class="modal-body est-detail-body" id="estDetail"></div>
      </div>
    </div>
    <div class="modal est-modal est-edit-modal" id="estCustomerModal" hidden>
      <div class="modal-backdrop" data-customer-close></div>
      <div
        class="modal-panel est-edit-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="customerModalTitle"
      >
        <div class="modal-head">
          <h2 id="customerModalTitle">고객정보 수정</h2>
          <button
            class="icon-btn"
            data-customer-close
            type="button"
            aria-label="수정 닫기"
          >
            ✕
          </button>
        </div>
        <form class="modal-body customer-edit-form" id="estCustomerForm"></form>
      </div>
    </div>

    <div class="modal est-modal" id="estSmsModal" hidden>
      <div class="modal-backdrop" data-sms-close></div>
      <div
        class="modal-panel est-edit-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="smsModalTitle"
        style="max-width: 600px"
      >
        <div class="modal-head">
          <h2 id="smsModalTitle">문자 발송 (LMS)</h2>
          <button
            class="icon-btn"
            data-sms-close
            type="button"
            aria-label="발송 닫기"
          >
            ✕
          </button>
        </div>
        <form class="modal-body" id="estSmsForm" style="padding: 16px 20px">
          <div
            id="smsHint"
            style="
              background: #fffbeb;
              border: 1px solid #fde68a;
              color: #92400e;
              padding: 8px 12px;
              border-radius: 6px;
              margin-bottom: 14px;
              font-size: 12px;
              line-height: 1.5;
            "
            hidden
          ></div>
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 6px;
              margin-bottom: 14px;
            "
          >
            <label
              style="
                font-size: 12px;
                font-weight: 600;
                color: var(--c-text-sub);
              "
              >수신자 전화번호</label
            >
            <input
              id="smsTo"
              type="tel"
              required
              placeholder="01012345678"
              style="
                padding: 10px 12px;
                border: 1px solid var(--c-border);
                border-radius: 6px;
                font-size: 14px;
              "
            />
            <div style="font-size: 11px; color: var(--c-text-muted)">
              기본값은 접수 카드의 고객 전화번호이며, 직접 수정해도 됩니다.
            </div>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 6px;
              margin-bottom: 14px;
            "
          >
            <label
              style="
                font-size: 12px;
                font-weight: 600;
                color: var(--c-text-sub);
              "
              >템플릿 선택 (선택사항)</label
            >
            <select
              id="smsTemplate"
              style="
                padding: 10px 12px;
                border: 1px solid var(--c-border);
                border-radius: 6px;
                font-size: 14px;
              "
            >
              <option value="">— 직접 작성 —</option>
            </select>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 6px;
              margin-bottom: 14px;
            "
          >
            <label
              style="
                font-size: 12px;
                font-weight: 600;
                color: var(--c-text-sub);
              "
              >제목 (LMS, 최대 40자)</label
            >
            <input
              id="smsSubject"
              type="text"
              maxlength="40"
              required
              style="
                padding: 10px 12px;
                border: 1px solid var(--c-border);
                border-radius: 6px;
                font-size: 14px;
              "
            />
            <div
              style="
                font-size: 11px;
                color: var(--c-text-muted);
                text-align: right;
              "
            >
              <span id="smsSubjectLen">0</span> / 40
            </div>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 6px;
              margin-bottom: 14px;
            "
          >
            <label
              style="
                font-size: 12px;
                font-weight: 600;
                color: var(--c-text-sub);
              "
              >본문</label
            >
            <textarea
              id="smsContent"
              required
              style="
                min-height: 220px;
                padding: 10px 12px;
                border: 1px solid var(--c-border);
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
                line-height: 1.55;
                resize: vertical;
              "
            ></textarea>
            <div
              style="
                font-size: 11px;
                color: var(--c-text-muted);
                text-align: right;
              "
            >
              <span id="smsContentBytes">0</span> bytes ·
              <span id="smsContentLen">0</span> 자
            </div>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 8px">
            <button type="button" class="btn btn-ghost" data-sms-close>
              취소
            </button>
            <button type="submit" class="btn btn-primary" id="btnSendSmsSubmit">
              발송
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js"></script>
    <script defer src="estimates.js?v=20260521-first-touch"></script>
  </body>
</html>
