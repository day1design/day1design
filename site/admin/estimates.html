<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담신청 관리 · DAYONE DESIGN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-body">
    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-logo">DAYONE ADMIN</div>
        <nav class="admin-nav">
          <a href="index.html" data-nav="home">Dashboard</a>
          <a href="hero-slides.html" data-nav="hero">Hero</a>
          <a href="portfolio.html" data-nav="portfolio">Portfolio</a>
          <a href="community.html" data-nav="community">Community</a>
          <a href="estimates.html" data-nav="estimates" class="active"
            >Estimates</a
          >
          <a href="#" id="btnLogout" class="admin-nav-secondary">로그아웃</a>
        </nav>
      </div>
    </header>

    <main class="admin-main">
      <section class="admin-section">
        <div class="admin-section-head">
          <div>
            <h1>상담신청 관리</h1>
            <p class="admin-sub">
              접수된 상담을 조회하고 상태/담당자/메모를 관리합니다.
            </p>
          </div>
          <div class="admin-status" id="apiStatus" data-state="unknown">
            <span class="dot"></span><span class="txt">API 확인 중</span>
          </div>
        </div>

        <div class="admin-toolbar">
          <div class="filter-row">
            <label>상태</label>
            <select id="filterStatus">
              <option value="">전체</option>
              <option value="접수대기">접수대기</option>
              <option value="상담중">상담중</option>
              <option value="견적완료">견적완료</option>
              <option value="계약완료">계약완료</option>
              <option value="취소">취소</option>
            </select>
            <input
              type="search"
              id="filterSearch"
              placeholder="이름/연락처/주소 검색"
            />
          </div>
        </div>

        <div class="est-layout">
          <div class="data-table-wrap est-list">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 120px">접수일</th>
                  <th>이름</th>
                  <th style="width: 120px">연락처</th>
                  <th style="width: 140px">유형/평수</th>
                  <th style="width: 90px">지점</th>
                  <th style="width: 100px">상태</th>
                </tr>
              </thead>
              <tbody id="estBody">
                <tr>
                  <td colspan="6" class="empty-state">불러오는 중...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <aside class="est-detail" id="estDetail">
            <div class="empty-state">좌측에서 항목을 선택하세요</div>
          </aside>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="estimates.js"></script>
  </body>
</html>
