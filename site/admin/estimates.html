<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담신청 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.co.kr" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.co.kr/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.co.kr/css/reset.css" />
    <link rel="stylesheet" href="admin.css?v=20260512-bottompad" />
    <script>
      window.ADMIN_PAGE = { title: "상담신청", nav: "estimates" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <section
          class="est-quick-stats"
          id="estQuickStats"
          aria-label="상담 접수량 간단 통계"
        >
          <article class="est-stat-card">
            <span class="est-stat-label">일간</span>
            <strong id="statDaily">—</strong>
            <em>오늘 접수</em>
          </article>
          <article class="est-stat-card">
            <span class="est-stat-label">주간</span>
            <strong id="statWeekly">—</strong>
            <em>최근 7일</em>
          </article>
          <article class="est-stat-card">
            <span class="est-stat-label">월간</span>
            <strong id="statMonthly">—</strong>
            <em>이번 달</em>
          </article>
        </section>

        <div class="admin-toolbar" style="margin-bottom: 16px">
          <div class="filter-row">
            <label>상태</label>
            <select id="filterStatus">
              <option value="">전체</option>
              <option value="접수대기">접수대기</option>
              <option value="상담중">상담중</option>
              <option value="견적완료">견적완료</option>
              <option value="계약완료">계약완료</option>
              <option value="취소">취소</option>
            </select>
            <label>출처</label>
            <select id="filterSource">
              <option value="">전체</option>
              <option value="homepage">홈페이지</option>
              <option value="meta">Meta 광고</option>
              <option value="google">Google</option>
              <option value="naver">Naver</option>
              <option value="youtube">YouTube</option>
              <option value="kakao">Kakao</option>
            </select>
            <input
              type="search"
              id="filterSearch"
              placeholder="이름/연락처/주소/캠페인 검색"
            />
          </div>
        </div>

        <div class="est-layout">
          <div class="est-list" id="estBody">
            <div class="empty-state">불러오는 중...</div>
          </div>
        </div>
      </main>
    </div>
    <div class="modal est-modal" id="estDetailModal" hidden>
      <div class="modal-backdrop" data-est-close></div>
      <div class="modal-panel est-modal-panel" role="dialog" aria-modal="true" aria-labelledby="estModalTitle">
        <div class="modal-head est-modal-head">
          <h2 id="estModalTitle">접수 상세</h2>
          <div class="modal-head-actions">
            <button class="btn btn-ghost" id="btnOpenCustomerEdit" type="button">
              고객정보 수정
            </button>
            <button class="icon-btn" data-est-close type="button" aria-label="상세 닫기">✕</button>
          </div>
        </div>
        <div class="modal-body est-detail-body" id="estDetail"></div>
      </div>
    </div>
    <div class="modal est-modal est-edit-modal" id="estCustomerModal" hidden>
      <div class="modal-backdrop" data-customer-close></div>
      <div class="modal-panel est-edit-panel" role="dialog" aria-modal="true" aria-labelledby="customerModalTitle">
        <div class="modal-head">
          <h2 id="customerModalTitle">고객정보 수정</h2>
          <button class="icon-btn" data-customer-close type="button" aria-label="수정 닫기">✕</button>
        </div>
        <form class="modal-body customer-edit-form" id="estCustomerForm"></form>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js"></script>
    <script defer src="estimates.js?v=20260513-livefetch"></script>
  </body>
</html>
