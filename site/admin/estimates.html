<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담신청 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.vercel.app" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "상담신청", nav: "estimates" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <div class="admin-toolbar" style="margin-bottom: 16px">
          <div class="filter-row">
            <label>상태</label>
            <select id="filterStatus">
              <option value="">전체</option>
              <option value="접수대기">접수대기</option>
              <option value="상담중">상담중</option>
              <option value="견적완료">견적완료</option>
              <option value="계약완료">계약완료</option>
              <option value="취소">취소</option>
            </select>
            <label>출처</label>
            <select id="filterSource">
              <option value="">전체</option>
              <option value="homepage">홈페이지</option>
              <option value="meta">Meta 광고</option>
            </select>
            <input
              type="search"
              id="filterSearch"
              placeholder="이름/연락처/주소/캠페인 검색"
            />
          </div>
        </div>

        <div class="est-layout">
          <div class="data-table-wrap est-list">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 110px">접수일</th>
                  <th style="width: 60px">출처</th>
                  <th>이름</th>
                  <th style="width: 120px">연락처</th>
                  <th style="width: 140px">유형/평수</th>
                  <th style="width: 80px">지점</th>
                  <th style="width: 90px">상태</th>
                </tr>
              </thead>
              <tbody id="estBody">
                <tr>
                  <td colspan="7" class="empty-state">불러오는 중...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <aside class="est-detail" id="estDetail">
            <div class="empty-state">좌측에서 항목을 선택하세요</div>
          </aside>
        </div>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js"></script>
    <script defer src="estimates.js"></script>
  </body>
</html>
