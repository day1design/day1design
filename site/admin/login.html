<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 로그인 · DAYONE DESIGN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.co.kr" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.co.kr/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.co.kr/css/variables.css" />
    <link rel="stylesheet" href="https://day1design.co.kr/css/reset.css" />
    <link rel="stylesheet" href="admin.css?v=20260520-touch2" />
    <style>
      .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        background: #fff;
        border: 1px solid #e5e1d6;
        border-radius: 8px;
        padding: 32px 28px;
      }
      .login-logo {
        font-weight: 700;
        letter-spacing: 3px;
        font-size: 13px;
        color: var(--color-brand-beige);
        text-align: center;
        margin-bottom: 24px;
      }
      .login-card h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 8px;
        text-align: center;
      }
      .login-sub {
        font-size: 13px;
        color: #8a8376;
        text-align: center;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .login-submit {
        width: 100%;
        margin-top: 8px;
      }
      .login-field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }
      .login-field label {
        font-size: 12px;
        color: #6f675d;
        font-weight: 600;
      }
      .login-field input {
        width: 100%;
        padding: 14px 12px;
        border: 1px solid #e5e1d6;
        border-radius: 4px;
        font-size: 15px;
        background: #fff;
      }
      .login-field input:focus {
        outline: none;
        border-color: var(--color-brand-beige);
      }
      .login-error {
        margin-top: 12px;
        font-size: 12px;
        color: #c5371a;
        min-height: 16px;
        text-align: center;
      }
      .login-info {
        margin-top: 12px;
        font-size: 12px;
        color: #3ea876;
        text-align: center;
        min-height: 16px;
      }
    </style>
  </head>
  <body class="admin-body">
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">DAYONE ADMIN</div>
        <h1>관리자 로그인</h1>
        <p class="login-sub">관리자 계정으로 접속합니다.</p>

        <form id="loginForm" autocomplete="on">
          <div class="login-field">
            <label for="username">아이디</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              inputmode="latin"
              required
            />
          </div>
          <div class="login-field">
            <label for="password">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary login-submit"
            id="btnLogin"
          >
            로그인
          </button>
        </form>

        <div class="login-info" id="info"></div>
        <div class="login-error" id="err"></div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js?v=20260602-search"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const next = params.get("next") || "dashboard.html";

      const form = document.getElementById("loginForm");
      const infoEl = document.getElementById("info");
      const errEl = document.getElementById("err");
      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const btnLogin = document.getElementById("btnLogin");

      function showError(msg) {
        errEl.textContent = msg;
        infoEl.textContent = "";
      }
      function showInfo(msg) {
        infoEl.textContent = msg;
        errEl.textContent = "";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const username = usernameEl.value.trim();
        const password = passwordEl.value;
        if (!username || !password) {
          showError("아이디와 비밀번호를 입력하세요.");
          return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = "확인 중...";
        showInfo("");
        showError("");
        try {
          const r = await adminUtil.api("/api/auth/login", {
            method: "POST",
            json: { username, password },
          });
          if (r.loggedIn) {
            // cookie 외에 토큰도 저장 — cross-site cookie 차단 시 fallback
            if (r.token) adminUtil.setToken(r.token);
            else adminUtil.clearToken();
            showInfo("로그인 성공 · 이동 중...");
            setTimeout(() => (location.href = next), 250);
          } else {
            showError("인증 실패");
          }
        } catch (e) {
          showError("로그인 실패");
        } finally {
          btnLogin.disabled = false;
          btnLogin.textContent = "로그인";
        }
      });

      usernameEl.focus();
    </script>
  </body>
</html>
