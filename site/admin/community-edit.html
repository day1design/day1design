<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 편집 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "게시글 편집", nav: "community" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <div class="admin-toolbar">
          <a href="community" class="btn btn-ghost">← 목록</a>
          <div class="save-actions">
            <button type="button" class="btn btn-ghost" id="btnCancel">
              취소
            </button>
            <button type="button" class="btn btn-primary" id="btnSave">
              저장
            </button>
          </div>
        </div>

        <form id="metaForm" class="meta-form">
          <div class="field-inline">
            <div class="field">
              <label>Idx <span class="req">*</span></label>
              <input
                type="text"
                name="idx"
                required
                placeholder="예: 170198572"
              />
              <p class="hint">
                숫자 ID, unique. 생성 후 변경 시 프론트 URL이 바뀌니 주의.
              </p>
            </div>
            <div class="field">
              <label>Date</label>
              <input type="date" name="date" />
            </div>
            <div class="field">
              <label>Board</label>
              <select name="board">
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>제목 <span class="req">*</span></label>
            <input type="text" name="title" required />
          </div>
          <div class="field-inline">
            <div class="field">
              <label>카테고리</label>
              <input
                type="text"
                name="category"
                placeholder="주거-디자인제안"
              />
            </div>
            <div class="field">
              <label>Views</label>
              <input type="number" name="views" min="0" value="0" />
            </div>
          </div>
          <div class="field">
            <label>썸네일 URL</label>
            <div class="field-row">
              <input
                type="url"
                name="thumb"
                placeholder="https://.../thumb.webp"
              />
              <input type="file" id="thumbFile" accept="image/*" />
            </div>
            <p class="hint">
              파일 선택 시 R2로 업로드되어 URL이 자동 입력됩니다.
            </p>
          </div>
          <div class="field">
            <label>Excerpt (목록 카드 요약)</label>
            <textarea
              name="excerpt"
              rows="2"
              maxlength="300"
              placeholder="비우면 본문 앞 80자 자동 생성"
            ></textarea>
          </div>
        </form>

        <div class="block-editor">
          <h3 class="be-title">본문 블록</h3>
          <p class="admin-sub" style="margin-bottom: 16px">
            블록 순서가 곧 본문 순서입니다. 텍스트/이미지를 섞어서 작성하세요.
          </p>
          <div class="blocks-list" id="blocksList"></div>
          <div class="blocks-add">
            <button type="button" class="btn btn-ghost" id="btnAddText">
              + 텍스트 블록
            </button>
            <button type="button" class="btn btn-ghost" id="btnAddImage">
              + 이미지 블록
            </button>
          </div>
        </div>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="community-edit.js"></script>
  </body>
</html>
