<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 편집 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "게시글 편집", nav: "community" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <div class="admin-toolbar">
          <a href="community" class="btn btn-ghost">← 목록</a>
          <div class="save-actions">
            <button type="button" class="btn btn-ghost" id="btnCancel">
              취소
            </button>
            <button type="button" class="btn btn-primary" id="btnSave">
              저장
            </button>
          </div>
        </div>

        <form id="metaForm" class="meta-form">
          <input type="hidden" name="idx" />
          <div class="field">
            <label>제목 <span class="req">*</span></label>
            <input type="text" name="title" required />
          </div>
          <div class="field-inline">
            <div class="field">
              <label>카테고리</label>
              <input
                type="text"
                name="category"
                placeholder="주거-디자인제안"
              />
            </div>
            <div class="field">
              <label>작성일</label>
              <input type="date" name="date" />
            </div>
            <div class="field">
              <label>게시판</label>
              <select name="board">
                <option value="Residential">주거</option>
                <option value="Commercial">상업</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>썸네일</label>
            <div class="thumb-upload">
              <div class="thumb-preview empty" id="thumbPreview"></div>
              <div class="thumb-actions">
                <input type="file" id="thumbFile" accept="image/*" hidden />
                <button type="button" class="btn btn-ghost" id="btnPickThumb">
                  📤 이미지 업로드
                </button>
                <button
                  type="button"
                  class="btn btn-ghost"
                  id="btnClearThumb"
                  hidden
                >
                  제거
                </button>
              </div>
            </div>
            <input type="hidden" name="thumb" />
          </div>
          <div class="field">
            <label>요약 (목록 카드용)</label>
            <textarea
              name="excerpt"
              rows="2"
              maxlength="300"
              placeholder="비우면 본문 앞 80자 자동 생성"
            ></textarea>
          </div>
        </form>

        <div class="block-editor">
          <h3 class="be-title">본문 블록</h3>
          <p class="admin-sub" style="margin-bottom: 12px">
            블록 순서가 곧 본문 순서입니다. 필요한 블록을 추가해 배치하세요.
          </p>
          <details class="block-guide">
            <summary>📘 블록 사용 가이드</summary>
            <ul>
              <li><strong>텍스트 블록</strong> — 본문 글을 작성합니다.</li>
              <li>
                <strong>이미지 블록</strong> — 사진을 추가합니다. 1장이면 전체
                너비로, 여러 장이면 2·3·4열 배치 중 선택할 수 있습니다.
              </li>
              <li>
                <strong>블록 순서 바꾸기</strong> — 각 블록의 ↑↓ 버튼으로
                이동합니다.
              </li>
              <li>
                <strong>블록 내부 이미지 순서</strong> — 썸네일을 드래그해서
                교체하세요.
              </li>
            </ul>
          </details>
          <div class="blocks-list" id="blocksList"></div>
          <div class="blocks-add">
            <button type="button" class="btn btn-ghost" id="btnAddText">
              + 텍스트 블록
            </button>
            <button type="button" class="btn btn-ghost" id="btnAddImage">
              + 이미지 블록
            </button>
          </div>
        </div>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="community-edit.js"></script>
  </body>
</html>
