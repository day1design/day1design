<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 편집 · DAYONE DESIGN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-body">
    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-logo">DAYONE ADMIN</div>
        <nav class="admin-nav">
          <a href="index.html" data-nav="home">Dashboard</a>
          <a href="hero-slides.html" data-nav="hero">Hero</a>
          <a href="portfolio.html" data-nav="portfolio">Portfolio</a>
          <a href="community.html" data-nav="community" class="active"
            >Community</a
          >
          <a href="estimates.html" data-nav="estimates">Estimates</a>
          <a href="#" id="btnLogout" class="admin-nav-secondary">로그아웃</a>
        </nav>
      </div>
    </header>

    <main class="admin-main">
      <section class="admin-section">
        <div class="admin-section-head">
          <div>
            <h1 id="pageTitle">게시글 편집</h1>
            <p class="admin-sub">
              <a href="community.html">← 목록</a> · 본문은 블록 에디터에서
              텍스트/이미지 블록을 추가·정렬하세요.
            </p>
          </div>
          <div class="save-actions">
            <button type="button" class="btn btn-ghost" id="btnCancel">
              취소
            </button>
            <button type="button" class="btn btn-primary" id="btnSave">
              저장
            </button>
          </div>
        </div>

        <form id="metaForm" class="meta-form">
          <div class="field-inline">
            <div class="field">
              <label>Idx <span class="req">*</span></label>
              <input
                type="text"
                name="idx"
                required
                placeholder="예: 170198572"
              />
              <p class="hint">
                숫자 ID, unique. 생성 후 변경 시 프론트 URL이 바뀌니 주의.
              </p>
            </div>
            <div class="field">
              <label>Date</label>
              <input type="date" name="date" />
            </div>
            <div class="field">
              <label>Board</label>
              <select name="board">
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>제목 <span class="req">*</span></label>
            <input type="text" name="title" required />
          </div>
          <div class="field-inline">
            <div class="field">
              <label>카테고리</label>
              <input
                type="text"
                name="category"
                placeholder="주거-디자인제안"
              />
            </div>
            <div class="field">
              <label>Views</label>
              <input type="number" name="views" min="0" value="0" />
            </div>
          </div>
          <div class="field">
            <label>썸네일 URL</label>
            <div class="field-row">
              <input
                type="url"
                name="thumb"
                placeholder="https://.../thumb.webp"
              />
              <input type="file" id="thumbFile" accept="image/*" />
            </div>
            <p class="hint">
              파일 선택 시 R2로 업로드되어 URL이 자동 입력됩니다.
            </p>
          </div>
          <div class="field">
            <label>Excerpt (목록 카드 요약)</label>
            <textarea
              name="excerpt"
              rows="2"
              maxlength="300"
              placeholder="자동으로 생성 가능 (비우면 본문 앞 80자)"
            ></textarea>
          </div>
        </form>

        <div class="block-editor">
          <h2 class="be-title">본문 블록</h2>
          <p class="admin-sub" style="margin-bottom: 16px">
            블록 순서가 곧 본문 순서입니다. 텍스트/이미지를 섞어서 작성하세요.
          </p>
          <div class="blocks-list" id="blocksList"></div>
          <div class="blocks-add">
            <button type="button" class="btn btn-ghost" id="btnAddText">
              + 텍스트 블록
            </button>
            <button type="button" class="btn btn-ghost" id="btnAddImage">
              + 이미지 블록
            </button>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="community-edit.js"></script>
  </body>
</html>
