<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포트폴리오 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "포트폴리오", nav: "portfolio" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <section class="admin-section">
          <p class="admin-sub" style="margin-bottom: 16px">
            시공 프로젝트를 등록·편집합니다. 카드 드래그로 순서를 변경하거나
            이미지를 카드에 드롭해 대표 썸네일을 교체할 수 있습니다.
          </p>

          <div class="admin-toolbar">
            <div class="filter-row">
              <label>공간 유형</label>
              <select id="filterCategory">
                <option value="">전체</option>
                <option value="HOUSE">HOUSE</option>
                <option value="OFFICE">OFFICE</option>
              </select>
              <input type="search" id="filterSearch" placeholder="이름 검색" />
            </div>
            <button type="button" class="btn btn-primary" id="btnNew">
              + 새 프로젝트
            </button>
          </div>

          <div class="card-grid" id="pfGrid"></div>

          <div class="save-bar">
            <div class="save-info">
              <span id="dirtyLabel" class="dirty-label hidden"
                >변경사항 있음</span
              >
              <span class="count-label">
                프로젝트: <strong id="pfCount">0</strong>
              </span>
            </div>
            <div class="save-actions">
              <button type="button" class="btn btn-ghost" id="btnRevert">
                순서 되돌리기
              </button>
              <button type="button" class="btn btn-primary" id="btnSave">
                순서 저장
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- 프로젝트 편집 모달 -->
    <div class="modal" id="pfModal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-panel" style="max-width: 720px">
        <div class="modal-head">
          <h2 id="modalTitle">프로젝트 편집</h2>
          <button class="icon-btn" data-close type="button">✕</button>
        </div>
        <form id="pfForm" class="modal-body">
          <div class="field">
            <label>프로젝트 제목 <span class="req">*</span></label>
            <input
              type="text"
              name="name"
              required
              placeholder="예: 판교 TH212 47평 아파트"
            />
          </div>

          <div class="field">
            <label>공간 유형 <span class="req">*</span></label>
            <select name="category" required>
              <option value="HOUSE">HOUSE (아파트 · 빌라 · 주택)</option>
              <option value="OFFICE">OFFICE (사무실 · 상가)</option>
            </select>
          </div>

          <div class="field">
            <label>대표 이미지</label>
            <div class="thumb-upload">
              <div class="thumb-preview empty" id="thumbAfterPreview"></div>
              <div class="thumb-actions">
                <input
                  type="file"
                  id="thumbAfterFile"
                  accept="image/*"
                  hidden
                />
                <button
                  type="button"
                  class="btn btn-ghost"
                  id="btnPickThumbAfter"
                >
                  📤 이미지 업로드
                </button>
                <button
                  type="button"
                  class="btn btn-ghost"
                  id="btnClearThumbAfter"
                  hidden
                >
                  제거
                </button>
              </div>
            </div>
          </div>

          <div class="field">
            <label>상세 갤러리 이미지</label>
            <p class="hint" style="margin-top: 0; margin-bottom: 8px">
              여러 장 선택 가능. 드래그로 순서 변경.
            </p>
            <div class="gallery-grid" id="galleryGrid"></div>
            <input
              type="file"
              id="galleryFiles"
              accept="image/*"
              multiple
              hidden
            />
            <button
              type="button"
              class="btn btn-ghost"
              id="btnAddGallery"
              style="margin-top: 6px"
            >
              + 이미지 추가 (여러 장 선택 가능)
            </button>
          </div>

          <details class="pair-fold">
            <summary>고급 옵션</summary>
            <input type="hidden" name="folder" />
            <div class="field">
              <label>페어링 - 우측 프로젝트 이름</label>
              <input
                type="text"
                name="rightName"
                placeholder="카드에 함께 표시할 프로젝트 (선택)"
              />
            </div>
            <div class="field-inline">
              <div class="field">
                <label>페어링 경로</label>
                <input type="text" name="rightFolder" />
              </div>
              <div class="field">
                <label>페어링 사진수</label>
                <input type="number" name="rightCount" min="0" value="0" />
              </div>
            </div>
          </details>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" data-close>취소</button>
            <button type="submit" class="btn btn-primary" id="btnSubmit">
              저장
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="portfolio.js"></script>
  </body>
</html>
