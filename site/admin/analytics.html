<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유입통계 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.vercel.app" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "유입통계", nav: "analytics" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <div class="notice-banner" role="note" aria-label="데이터 연결 안내">
          <strong>ⓘ 유입통계(상단)는 GA4 연동 대기 중입니다.</strong>
          <strong>접수 통계(하단)는 실데이터</strong>로 기간 필터가 적용됩니다.
        </div>

        <div class="analytics-toolbar">
          <div class="seg" role="tablist" aria-label="기간">
            <button type="button" class="seg-btn" data-range="7">7일</button>
            <button
              type="button"
              class="seg-btn active"
              data-range="30"
              aria-pressed="true"
            >
              30일
            </button>
            <button type="button" class="seg-btn" data-range="prev-month">
              전월
            </button>
            <button type="button" class="seg-btn" data-range="cur-month">
              당월
            </button>
            <button type="button" class="seg-btn" data-range="all">전체</button>
            <button type="button" class="seg-btn" data-range="custom">
              선택기간
            </button>
          </div>
          <div class="analytics-range-picker" id="rangePicker" hidden>
            <label>
              <span>시작</span>
              <input type="date" id="rangeStart" />
            </label>
            <label>
              <span>종료</span>
              <input type="date" id="rangeEnd" />
            </label>
            <button type="button" class="btn-apply-range" id="btnApplyRange">
              적용
            </button>
          </div>
          <div class="analytics-compare" id="rangeLabel">최근 30일</div>
        </div>

        <section class="kpi-grid">
          <article class="kpi-card">
            <div class="kpi-label">방문자</div>
            <div class="kpi-value" id="kpiVisitors">—</div>
            <div class="kpi-delta" id="kpiVisitorsDelta">—</div>
          </article>
          <article class="kpi-card">
            <div class="kpi-label">페이지뷰</div>
            <div class="kpi-value" id="kpiPageviews">—</div>
            <div class="kpi-delta" id="kpiPageviewsDelta">—</div>
          </article>
          <article class="kpi-card">
            <div class="kpi-label">평균 체류</div>
            <div class="kpi-value" id="kpiDuration">—</div>
            <div class="kpi-delta" id="kpiDurationDelta">—</div>
          </article>
          <article class="kpi-card">
            <div class="kpi-label">이탈률</div>
            <div class="kpi-value" id="kpiBounce">—</div>
            <div class="kpi-delta" id="kpiBounceDelta">—</div>
          </article>
        </section>

        <section class="analytics-row">
          <div class="panel">
            <div class="panel-head">
              <h3>일별 방문 추이</h3>
              <span class="panel-sub">방문자 · 페이지뷰</span>
            </div>
            <div class="chart-wrap">
              <canvas id="chartTrend" height="260"></canvas>
            </div>
          </div>
        </section>

        <section class="analytics-row two-col">
          <div class="panel">
            <div class="panel-head">
              <h3>인기 페이지 TOP 10</h3>
              <span class="panel-sub">페이지뷰 기준</span>
            </div>
            <table class="top-table" id="topPagesTable">
              <thead>
                <tr>
                  <th style="width: 40px">#</th>
                  <th>경로</th>
                  <th style="width: 100px; text-align: right">페이지뷰</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h3>유입 경로</h3>
              <span class="panel-sub">세션 비율</span>
            </div>
            <div class="chart-wrap">
              <canvas id="chartSources" height="260"></canvas>
            </div>
          </div>
        </section>

        <section class="analytics-row">
          <div class="panel">
            <div class="panel-head">
              <h3>상담 접수 통계 · 실데이터</h3>
              <span class="panel-sub">출처별 · 기간별 접수 건수</span>
            </div>
            <div class="sub-kpi" id="subKpi">
              <div class="sub-kpi-item">
                <div class="sub-kpi-label">총 접수</div>
                <div class="sub-kpi-value" id="subTotal">—</div>
              </div>
              <div class="sub-kpi-item">
                <div class="sub-kpi-label">홈페이지</div>
                <div class="sub-kpi-value" id="subHomepage">—</div>
              </div>
              <div class="sub-kpi-item">
                <div class="sub-kpi-label">Meta 광고</div>
                <div class="sub-kpi-value" id="subMeta">—</div>
              </div>
              <div class="sub-kpi-item">
                <div class="sub-kpi-label">Meta 비중</div>
                <div class="sub-kpi-value" id="subMetaRatio">—</div>
              </div>
            </div>
            <div class="chart-wrap" style="margin-top: 16px">
              <canvas id="chartSubmissions" height="240"></canvas>
            </div>
          </div>
        </section>

        <section class="analytics-row two-col">
          <div class="panel">
            <div class="panel-head">
              <h3>상태별 분포</h3>
              <span class="panel-sub">현재 기준</span>
            </div>
            <div class="chart-wrap">
              <canvas id="chartStatus" height="220"></canvas>
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h3>Meta 캠페인 TOP 5</h3>
              <span class="panel-sub">접수 건수</span>
            </div>
            <table class="top-table" id="topCampaignsTable">
              <thead>
                <tr>
                  <th style="width: 40px">#</th>
                  <th>캠페인</th>
                  <th style="width: 70px; text-align: right">접수</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="3" class="empty-state">불러오는 중...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
    ></script>
    <script defer src="config.js"></script>
    <script defer src="admin.js"></script>
    <script defer src="analytics.js"></script>
  </body>
</html>
