<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>히어로 슬라이드 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "히어로 슬라이드", nav: "hero" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <section class="admin-section">
          <p class="admin-sub" style="margin-bottom: 20px">
            메인 페이지 상단 슬라이드를 등록·정렬·삭제합니다. 최대
            <strong>10</strong>장. 이미지는 업로드 시
            <strong>WebP 자동 압축</strong>됩니다. 카드 드래그로 순서 교체,
            카드에 이미지 드롭으로 교체 가능.
          </p>

          <div class="slides-list" id="slidesList"></div>

          <div class="slide-add" id="slideAddWrap">
            <button type="button" class="btn-add" id="btnAdd">
              + 슬라이드 추가
            </button>
            <form class="add-form hidden" id="addForm">
              <div class="field">
                <label>이미지 <span class="req">*</span></label>
                <input type="file" id="uploadInput" accept="image/*" />
                <p class="hint">
                  파일 선택 시 WebP로 자동 변환 후 R2 업로드됩니다.
                </p>
              </div>
              <div class="field-preview hidden" id="previewWrap">
                <div
                  class="preview"
                  id="preview"
                  style="background-image: none"
                ></div>
              </div>
              <div class="field">
                <label>링크 (선택)</label>
                <input
                  type="text"
                  id="hrefInput"
                  placeholder="예: pages/portfolio.html (비우면 클릭 불가)"
                />
              </div>
              <div class="field">
                <label>제목 / Alt 텍스트</label>
                <input
                  type="text"
                  id="altInput"
                  placeholder="접근성/SEO용 설명"
                />
              </div>
              <div class="form-actions">
                <button type="button" class="btn btn-ghost" id="btnCancelAdd">
                  취소
                </button>
                <button
                  type="submit"
                  class="btn btn-primary"
                  id="btnConfirmAdd"
                >
                  목록에 추가
                </button>
              </div>
            </form>
          </div>

          <div class="save-bar">
            <div class="save-info">
              <span id="dirtyLabel" class="dirty-label hidden"
                >변경사항 있음</span
              >
              <span class="count-label">
                등록된 슬라이드: <strong id="slideCount">0</strong> / 10
              </span>
            </div>
            <div class="save-actions">
              <button type="button" class="btn btn-ghost" id="btnRevert">
                되돌리기
              </button>
              <button type="button" class="btn btn-primary" id="btnSave">
                저장
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="hero-slides.js"></script>
  </body>
</html>
