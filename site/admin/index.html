<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대시보드 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.vercel.app" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "대시보드", nav: "home" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <div class="dash-grid">
          <a href="hero-slides" class="dash-card">
            <div class="dash-card-head">
              <h3>히어로 슬라이드</h3>
              <span class="dash-card-count" id="statHero">—</span>
            </div>
            <p>메인 페이지 상단 슬라이드 등록·정렬·삭제 (최대 10장)</p>
          </a>
          <a href="portfolio" class="dash-card">
            <div class="dash-card-head">
              <h3>포트폴리오</h3>
              <span class="dash-card-count" id="statPortfolio">—</span>
            </div>
            <p>시공 포트폴리오 등록·편집·순서 조정</p>
          </a>
          <a href="community" class="dash-card">
            <div class="dash-card-head">
              <h3>커뮤니티</h3>
              <span class="dash-card-count" id="statCommunity">—</span>
            </div>
            <p>게시글 등록·수정 (블록 에디터 포함)</p>
          </a>
          <a href="estimates" class="dash-card">
            <div class="dash-card-head">
              <h3>상담신청</h3>
              <span class="dash-card-count" id="statEstimates">—</span>
            </div>
            <p>접수 내역 조회·상태/담당자 변경</p>
          </a>
          <a href="analytics" class="dash-card">
            <div class="dash-card-head">
              <h3>유입·접수 통계</h3>
              <span class="dash-card-count" id="statAnalytics">—</span>
            </div>
            <p>기간별 유입·접수 추이 · 출처별 · Meta 캠페인 분석</p>
          </a>
        </div>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js"></script>
    <script>
      (async () => {
        async function loadCount(path, id, key = "records") {
          try {
            const d = await adminUtil.apiCached(path, { ttl: 60_000 });
            const n = Array.isArray(d?.[key])
              ? d[key].length
              : Array.isArray(d?.posts)
                ? d.posts.length
                : Array.isArray(d?.slides)
                  ? d.slides.length
                  : null;
            document.getElementById(id).textContent = n !== null ? n : "—";
          } catch {
            document.getElementById(id).textContent = "—";
          }
        }
        async function loadEstimatesStats() {
          try {
            const d = await adminUtil.apiCached("/api/estimates", {
              ttl: 60_000,
            });
            const all = d?.records || [];
            document.getElementById("statEstimates").textContent = all.length;
            const since = Date.now() - 30 * 24 * 60 * 60 * 1000;
            const recent = all.filter((r) => {
              const t = Date.parse(r.SubmittedAt || "");
              return !isNaN(t) && t >= since;
            }).length;
            document.getElementById("statAnalytics").textContent =
              `${recent} / 30일`;
          } catch {
            document.getElementById("statEstimates").textContent = "—";
            document.getElementById("statAnalytics").textContent = "—";
          }
        }
        // ensureAuth는 admin.js bootstrap이 이미 호출
        loadCount("/api/hero/slides", "statHero");
        loadCount("/api/portfolio", "statPortfolio");
        loadCount("/api/community", "statCommunity", "posts");
        loadEstimatesStats();
      })();
    </script>
  </body>
</html>
