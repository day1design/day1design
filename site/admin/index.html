<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대시보드 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.vercel.app" crossorigin />
    <link
      rel="preconnect"
      href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev"
      crossorigin
    />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.ADMIN_PAGE = { title: "대시보드", nav: "home" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <section class="dash-block">
          <div class="dash-block-head">
            <h3>
              유입 요약 <span class="dash-block-sub">· 최근 30일 예시</span>
            </h3>
            <a href="analytics" class="dash-block-link">자세히 보기 →</a>
          </div>
          <div class="dash-kpi-grid">
            <div class="dash-kpi">
              <div class="dash-kpi-label">방문자</div>
              <div class="dash-kpi-value" id="dashVisitors">—</div>
            </div>
            <div class="dash-kpi">
              <div class="dash-kpi-label">페이지뷰</div>
              <div class="dash-kpi-value" id="dashPageviews">—</div>
            </div>
            <div class="dash-kpi">
              <div class="dash-kpi-label">평균 체류</div>
              <div class="dash-kpi-value" id="dashDuration">—</div>
            </div>
            <div class="dash-kpi">
              <div class="dash-kpi-label">이탈률</div>
              <div class="dash-kpi-value" id="dashBounce">—</div>
            </div>
          </div>
        </section>

        <section class="dash-block">
          <div class="dash-block-head">
            <h3>
              상담 접수 <span class="dash-block-sub">· 최근 30일 실데이터</span>
            </h3>
            <a href="estimates" class="dash-block-link">목록 보기 →</a>
          </div>
          <div class="dash-kpi-grid">
            <div class="dash-kpi">
              <div class="dash-kpi-label">총 접수</div>
              <div class="dash-kpi-value" id="dashSubTotal">—</div>
              <div class="dash-kpi-foot" id="dashSubTotalAll">전체 —</div>
            </div>
            <div class="dash-kpi">
              <div class="dash-kpi-label">홈페이지</div>
              <div class="dash-kpi-value" id="dashSubHomepage">—</div>
              <div class="dash-kpi-foot" id="dashSubHomepageRatio">—</div>
            </div>
            <div class="dash-kpi">
              <div class="dash-kpi-label">Meta 광고</div>
              <div class="dash-kpi-value" id="dashSubMeta">—</div>
              <div class="dash-kpi-foot" id="dashSubMetaRatio">—</div>
            </div>
            <div class="dash-kpi">
              <div class="dash-kpi-label">접수대기</div>
              <div class="dash-kpi-value" id="dashSubPending">—</div>
              <div class="dash-kpi-foot">상태 확인 필요</div>
            </div>
          </div>
        </section>

        <section class="dash-block">
          <div class="dash-block-head">
            <h3>관리 바로가기</h3>
          </div>
          <div class="dash-grid">
            <a href="hero-slides" class="dash-card">
              <div class="dash-card-head">
                <h3>히어로 슬라이드</h3>
                <span class="dash-card-count" id="statHero">—</span>
              </div>
              <p>메인 페이지 상단 슬라이드 등록·정렬·삭제 (최대 10장)</p>
            </a>
            <a href="portfolio" class="dash-card">
              <div class="dash-card-head">
                <h3>포트폴리오</h3>
                <span class="dash-card-count" id="statPortfolio">—</span>
              </div>
              <p>시공 포트폴리오 등록·편집·순서 조정</p>
            </a>
            <a href="community" class="dash-card">
              <div class="dash-card-head">
                <h3>커뮤니티</h3>
                <span class="dash-card-count" id="statCommunity">—</span>
              </div>
              <p>게시글 등록·수정 (블록 에디터 포함)</p>
            </a>
            <a href="estimates" class="dash-card">
              <div class="dash-card-head">
                <h3>상담신청</h3>
                <span class="dash-card-count" id="statEstimates">—</span>
              </div>
              <p>접수 내역 조회·상태/담당자 변경</p>
            </a>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js"></script>
    <script>
      (async () => {
        const $ = (id) => document.getElementById(id);

        async function loadCount(path, id, key = "records") {
          try {
            const d = await adminUtil.apiCached(path, { ttl: 60_000 });
            const n = Array.isArray(d?.[key])
              ? d[key].length
              : Array.isArray(d?.posts)
                ? d.posts.length
                : Array.isArray(d?.slides)
                  ? d.slides.length
                  : null;
            $(id).textContent = n !== null ? n : "—";
          } catch {
            $(id).textContent = "—";
          }
        }

        // 유입 요약(예시) — analytics.js 30일 기준 MOCK 일치
        function renderAnalyticsSummary() {
          $("dashVisitors").textContent = (1234).toLocaleString("ko-KR");
          $("dashPageviews").textContent = (5678).toLocaleString("ko-KR");
          $("dashDuration").textContent = "2:34";
          $("dashBounce").textContent = "42%";
        }

        async function loadSubmissionSummary() {
          try {
            const d = await adminUtil.apiCached("/api/estimates", {
              ttl: 60_000,
            });
            const all = d?.records || [];
            $("statEstimates").textContent = all.length;

            const since = Date.now() - 30 * 24 * 60 * 60 * 1000;
            let total = 0,
              meta = 0,
              home = 0,
              pending = 0;
            for (const r of all) {
              const t = Date.parse(r.SubmittedAt || "");
              if (isNaN(t) || t < since) continue;
              total++;
              if ((r.Source || "").toLowerCase() === "meta") meta++;
              else home++;
              if ((r.Status || "접수대기") === "접수대기") pending++;
            }

            $("dashSubTotal").textContent = total.toLocaleString("ko-KR");
            $("dashSubTotalAll").textContent =
              `전체 ${all.length.toLocaleString("ko-KR")}건`;
            $("dashSubHomepage").textContent = home.toLocaleString("ko-KR");
            $("dashSubHomepageRatio").textContent =
              total > 0 ? `${Math.round((home / total) * 100)}%` : "—";
            $("dashSubMeta").textContent = meta.toLocaleString("ko-KR");
            $("dashSubMetaRatio").textContent =
              total > 0 ? `${Math.round((meta / total) * 100)}%` : "—";
            $("dashSubPending").textContent = pending.toLocaleString("ko-KR");
          } catch {
            [
              "dashSubTotal",
              "dashSubHomepage",
              "dashSubMeta",
              "dashSubPending",
            ].forEach((id) => ($(id).textContent = "—"));
            $("statEstimates").textContent = "—";
          }
        }

        // ensureAuth는 admin.js bootstrap이 이미 호출
        renderAnalyticsSummary();
        loadCount("/api/hero/slides", "statHero");
        loadCount("/api/portfolio", "statPortfolio");
        loadCount("/api/community", "statCommunity", "posts");
        loadSubmissionSummary();
      })();
    </script>
  </body>
</html>
