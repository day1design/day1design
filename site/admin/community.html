<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>커뮤니티 관리 · DAYONE DESIGN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/fonts.css" />
    <link
      rel="stylesheet"
      href="https://day1design.vercel.app/css/variables.css"
    />
    <link rel="stylesheet" href="https://day1design.vercel.app/css/reset.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-body">
    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-logo">DAYONE ADMIN</div>
        <nav class="admin-nav">
          <a href="index.html" data-nav="home">Dashboard</a>
          <a href="hero-slides.html" data-nav="hero">Hero</a>
          <a href="portfolio.html" data-nav="portfolio">Portfolio</a>
          <a href="community.html" data-nav="community" class="active"
            >Community</a
          >
          <a href="estimates.html" data-nav="estimates">Estimates</a>
          <a href="#" id="btnLogout" class="admin-nav-secondary">로그아웃</a>
        </nav>
      </div>
    </header>

    <main class="admin-main">
      <section class="admin-section">
        <div class="admin-section-head">
          <div>
            <h1>커뮤니티 관리</h1>
            <p class="admin-sub">
              게시글 목록·편집. 본문은 text/image 블록을 순서대로 구성하는 블록
              에디터를 사용합니다.
            </p>
          </div>
          <div class="admin-status" id="apiStatus" data-state="unknown">
            <span class="dot"></span><span class="txt">API 확인 중</span>
          </div>
        </div>

        <div class="admin-toolbar">
          <div class="filter-row">
            <label>Board</label>
            <select id="filterBoard">
              <option value="">전체</option>
              <option value="Residential">Residential</option>
              <option value="Commercial">Commercial</option>
            </select>
            <input
              type="search"
              id="filterSearch"
              placeholder="제목/카테고리/Idx 검색"
            />
          </div>
          <a class="btn btn-primary" href="community-edit.html?new=1"
            >+ 새 게시글</a
          >
        </div>

        <div class="data-table-wrap">
          <table class="data-table" id="cmTable">
            <thead>
              <tr>
                <th style="width: 44px">#</th>
                <th style="width: 56px">썸</th>
                <th>제목</th>
                <th style="width: 140px">카테고리</th>
                <th style="width: 100px">Date</th>
                <th style="width: 100px">Board</th>
                <th style="width: 80px">Views</th>
                <th style="width: 120px"></th>
              </tr>
            </thead>
            <tbody id="cmBody">
              <tr>
                <td colspan="8" class="empty-state">불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
    <script src="community.js"></script>
  </body>
</html>
