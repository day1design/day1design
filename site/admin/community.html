<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>커뮤니티 · DAYONE ADMIN</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://day1design.co.kr" crossorigin />
    <link rel="preconnect" href="https://pub-7a0a5e1669f345bb8ae95ab3c7865149.r2.dev" crossorigin />
    <link rel="stylesheet" href="https://day1design.co.kr/css/fonts.css" />
    <link rel="stylesheet" href="https://day1design.co.kr/css/reset.css" />
    <link rel="stylesheet" href="admin.css?v=20260520-touch2" />
    <script>
      window.ADMIN_PAGE = { title: "커뮤니티", nav: "community" };
    </script>
  </head>
  <body class="admin-body">
    <aside
      class="admin-sidebar"
      id="adminSidebar"
      aria-label="관리자 메뉴"
    ></aside>
    <div class="admin-backdrop" id="adminBackdrop" aria-hidden="true"></div>
    <div class="admin-layout">
      <header class="admin-topbar" id="adminTopbar"></header>
      <main class="admin-content" id="adminContent">
        <section class="admin-section">
          <p class="admin-sub" style="margin-bottom: 16px">
            커뮤니티 게시글을 등록·편집합니다.
          </p>

          <div class="admin-toolbar">
            <div class="filter-row">
              <label>Board</label>
              <select id="filterBoard">
                <option value="">전체</option>
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
              </select>
              <input
                type="search"
                id="filterSearch"
                placeholder="제목/카테고리/Idx 검색"
              />
            </div>
            <a class="btn btn-primary" href="community-edit?new=1"
              >+ 새 게시글</a
            >
          </div>

          <div class="data-table-wrap">
            <table class="data-table" id="cmTable">
              <thead>
                <tr>
                  <th style="width: 44px">#</th>
                  <th style="width: 56px">썸</th>
                  <th>제목</th>
                  <th style="width: 140px">카테고리</th>
                  <th style="width: 100px">Date</th>
                  <th style="width: 100px">Board</th>
                  <th style="width: 70px">Views</th>
                  <th style="width: 100px"></th>
                </tr>
              </thead>
              <tbody id="cmBody">
                <tr>
                  <td colspan="8" class="empty-state">불러오는 중...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script defer src="config.js"></script>
    <script defer src="admin.js?v=20260602-search"></script>
    <script defer src="community.js"></script>
  </body>
</html>
